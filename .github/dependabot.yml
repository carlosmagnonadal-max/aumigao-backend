# Dependabot — aumigao-backend (FastAPI / Python)
# Atualizações de versão + alertas de segurança automáticos.
# Docs: https://docs.github.com/code-security/dependabot
version: 2
updates:
  # Dependências Python (requirements.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    # Cooldown anti-supply-chain: versões maliciosas (axios mar/2026, chalk set/2025)
    # viveram ~3h no registry; esperar 7 dias antes de adotar release nova neutraliza isso.
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
    # Agrupa patch/minor num PR só para reduzir ruído; majors vêm separados.
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions usadas no CI (.github/workflows/ci.yml)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
